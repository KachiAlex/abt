services:
  # Backend API Service
  - type: web
    name: abt-api
    env: node
    plan: starter
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false  # Set this in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: abt-database
          property: connectionString
    healthCheckPath: /health

databases:
  # PostgreSQL Database
  - name: abt-database
    plan: starter
    databaseName: abt_tracker
    user: abt_user

